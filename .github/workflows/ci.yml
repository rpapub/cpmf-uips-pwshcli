name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  test:
    name: Pester + PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module Pester -ListAvailable | Where-Object Version -ge '5.0')) {
            Install-Module Pester -Scope CurrentUser -Force -MinimumVersion 5.0
          }

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module PSScriptAnalyzer -ListAvailable)) {
            Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          }

      - name: Install CpmfUipsPack dependency
        shell: pwsh
        run: |
          Install-Module CpmfUipsPack -Scope CurrentUser -Force -MinimumVersion 0.1.0

      - name: Validate manifest
        shell: pwsh
        run: Test-ModuleManifest ./CpmfUipsCLI/CpmfUipsCLI.psd1

      - name: Run Pester
        shell: pwsh
        run: |
          $result = Invoke-Pester ./CpmfUipsCLI/tests/ -Output Normal -PassThru
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester: $($result.FailedCount) test(s) failed"
            exit 1
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $findings = Invoke-ScriptAnalyzer `
            -Path ./CpmfUipsCLI `
            -Recurse `
            -Settings ./CpmfUipsCLI/PSScriptAnalyzerSettings.psd1
          if ($findings.Count -gt 0) {
            $findings | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer: $($findings.Count) finding(s)"
            exit 1
          }
          Write-Host "PSScriptAnalyzer: clean"
